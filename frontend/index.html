<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welding Defect Inspection System</title>
    <link rel="stylesheet" href="/static/styles.css?v=8">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">YOLO SEGMENTATION</p>
          <h1>Welding Defect Inspection System</h1>
        </div>
        <div class="health" id="healthStatus">
          <span class="health-dot"></span>
          <span>Checking model status</span>
        </div>
      </header>

      <section class="workspace">
        <aside class="control-panel">
          <form id="uploadForm" class="upload-form">
            <label class="file-drop" for="imageInput" id="dropZone">
              <input id="imageInput" name="file" type="file" accept="image/*">
              <span class="file-title">Select Welding Image</span>
              <span class="file-name" id="fileName">JPG, PNG, BMP, WEBP</span>
            </label>

            <div class="preview-frame">
              <img id="previewImage" alt="Original Image">

              <div class="empty-preview" id="emptyPreview">Original Image</div>
            </div>

            <div class="settings-grid">
              <div class="model-config-row">
                <label>
                  <span>YOLO Model</span>
                  <select id="yoloModelInput" name="yolo_model">
                    <option value="">Loading models...</option>
                  </select>
                </label>

                <label>
                  <span>Image Size</span>
                  <select id="yoloImgszInput" name="imgsz">
                    <option value="640">640</option>
                    <option value="960" selected>960</option>
                    <option value="1280">1280</option>
                  </select>
                </label>
              </div>

              <div class="model-config-row">
                <label>
                  <span>U-Net Model</span>
                  <select id="unetModelInput" name="unet_model">
                    <option value="">Loading models...</option>
                  </select>
                </label>

                <label>
                  <span>Image Size</span>
                  <select id="unetImgszInput" name="unet_imgsz">
                    <option value="256">256</option>
                    <option value="512" selected>512</option>
                  </select>
                </label>
              </div>

              <label>
                <span>Confidence Threshold</span>
                <output id="confValue">0.25</output>
                <input id="confInput" name="conf" type="range" min="0.05" max="0.90" step="0.05" value="0.25">
              </label>

              <label>
                <span>IoU Threshold</span>
                <output id="iouValue">0.25</output>
                <input id="iouInput" name="iou" type="range" min="0.05" max="0.90" step="0.05" value="0.25">
              </label>

              <label>
                <span>U-Net Threshold</span>
                <output id="unetThresholdValue">0.25</output>
                <input id="unetThresholdInput" name="unet_threshold" type="range" min="0.05" max="0.9" step="0.05" value="0.3">
              </label>

              <label>
                <span>ROI Margin</span>
                <output id="roiMarginValue">0.5</output>
                <input id="roiMarginInput" name="roi_margin" type="range" min="0.05" max="0.90" step="0.05" value="0.15">
              </label>

              <fieldset class="display-settings">
                <legend>Display</legend>

                <div class="display-options">
                  <label class="display-option">
                    <input id="showMasksInput" name="show_masks" type="checkbox">
                    <span>Masks</span>
                  </label>

                  <label class="display-option">
                    <input id="showBoxesInput" name="show_boxes" type="checkbox" checked>
                    <span>Boxes</span>
                  </label>

                  <label class="display-option">
                    <input id="showLabelsInput" name="show_labels" type="checkbox">
                    <span>Labels</span>
                  </label>

                  <label class="display-option">
                    <input id="showConfInput" name="show_conf" type="checkbox">
                    <span>Confidence</span>
                  </label>
                </div>
              </fieldset>
            </div>

            <div class="actions">
              <button class="primary-button" id="submitButton" type="submit" disabled>
                Inspect
              </button>

              <button class="ghost-button" id="resetButton" type="button">
                Clear
              </button>
            </div>
          </form>
        </aside>

        <section class="result-panel">
          <div class="result-header">
            <div>
              <p class="eyebrow">RESULT</p>
              <h2 id="verdictTitle">No Image Selected</h2>
            </div>

            <div class="result-header-actions">
              <div class="score-chip" id="scoreChip">--</div>

              <button
                class="ghost-button"
                id="downloadButton"
                type="button"
                disabled
              >
                Save Result
              </button>
            </div>
          </div>

          <div class="metrics">
            <div>
              <span>Primary Class</span>
              <strong id="primaryClass">--</strong>
            </div>

            <div>
              <span>Detected Regions</span>
              <strong id="defectCount">--</strong>
            </div>

            <div>
              <span>Inference Time</span>
              <strong id="inferenceTime">--</strong>
            </div>
          </div>

          <div class="tabs" role="tablist" aria-label="Prediction Views">
            <button class="tab-button active" type="button" data-tab="overlay">
              Overlay
            </button>

            <button class="tab-button" type="button" data-tab="mask">
              Mask YOLO
            </button>

            <button class="tab-button" type="button" data-tab="unet-mask">
              Mask U-Net
            </button>
          </div>

          <div class="image-stage">
            <img id="overlayImage" class="result-image active" alt="Segmentation Overlay">

            <img id="maskImage" class="result-image" alt="Segmentation Mask">

            <img
              id="unetMaskImage"
              class="result-image"
              alt="U-Net Ripple Mask"
            >

            <div class="empty-result" id="emptyResult">
              Segmentation Output
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Class</th>
                  <th>Confidence</th>
                  <th>Bounding Box</th>
                  <th>Mask Area (px)</th>
                </tr>
              </thead>

              <tbody id="predictionRows">
                <tr>
                  <td colspan="4">--</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="/static/app.js?v=9"></script>
  </body>
</html>
